# Production-default compose file.
#
# - PROD: Coolify (or any Docker host) uses this file directly. Env vars
#   come from Coolify's Environment Variables UI; the reverse proxy handles
#   HTTPS + routing, so no host port mappings are exposed here.
#
# - DEV: layer docker-compose.dev.yml on top to add port mappings, source
#   bind mounts for hot reload, dev build targets, and env_file loading
#   from local .env. The Makefile does this automatically — `make up`,
#   `make down`, etc. behave like before.
#
# Networking: we deliberately do NOT declare a custom `networks:` block.
# When this file is deployed under Coolify, Traefik lives on the
# `coolify` network and Coolify attaches our containers there for routing.
# A custom bridge network would isolate our containers from Traefik and
# cause intermittent 502s. The default network compose creates is enough
# for service-to-service DNS (postgres, logto, backend, frontend) and
# coexists fine with Coolify's network attachments.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  logto:
    image: svhd/logto:1.39.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TRUST_PROXY_HEADER: 1
      CI: "true" # non-interactive migrations
      DB_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/logto
      ENDPOINT: ${LOGTO_ENDPOINT}
      ADMIN_ENDPOINT: ${LOGTO_ADMIN_ENDPOINT}
    # First boot seeds the schema; subsequent boots are no-ops thanks to --swe.
    # `alteration deploy latest` applies any pending Logto migrations.
    entrypoint:
      - sh
      - -c
      - npm run cli db seed -- --swe && npm run cli db alteration deploy latest && npm start

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      logto:
        condition: service_started
    environment:
      APP_ENV: ${APP_ENV}
      APP_BASE_URL: ${APP_BASE_URL}
      BACKEND_BASE_URL: ${BACKEND_BASE_URL}
      DATABASE_URL: ${DATABASE_URL}
      LOGTO_ENDPOINT: ${LOGTO_ENDPOINT}
      LOGTO_INTERNAL_URL: ${LOGTO_INTERNAL_URL}
      LOGTO_M2M_APP_ID: ${LOGTO_M2M_APP_ID}
      LOGTO_M2M_APP_SECRET: ${LOGTO_M2M_APP_SECRET}
      LOGTO_APP_ID: ${LOGTO_APP_ID}
      LOGTO_RESOURCE: ${LOGTO_RESOURCE}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      EXTRACTION_MODEL: ${EXTRACTION_MODEL}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_ENDPOINT: ${R2_ENDPOINT}
      POSTMARK_WEBHOOK_SECRET: ${POSTMARK_WEBHOOK_SECRET}
      QBO_CLIENT_ID: ${QBO_CLIENT_ID}
      QBO_CLIENT_SECRET: ${QBO_CLIENT_SECRET}
      QBO_ENVIRONMENT: ${QBO_ENVIRONMENT}
      QBO_REDIRECT_URI: ${QBO_REDIRECT_URI}
      QBO_DEFAULT_EXPENSE_ACCOUNT_ID: ${QBO_DEFAULT_EXPENSE_ACCOUNT_ID}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM: ${RESEND_FROM}
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      # /api/health does a single SELECT 1, so it should be fast even under
      # extraction load now that the event loop isn't blocked. We still give
      # generous timeouts + retry budget so a brief network blip or a startup
      # alembic migration doesn't trigger a full container restart.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health',timeout=8).status==200 else 1)"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
      # VITE_* values are baked into the static JS bundle at build time.
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_LOGTO_ENDPOINT: ${VITE_LOGTO_ENDPOINT}
        VITE_LOGTO_APP_ID: ${VITE_LOGTO_APP_ID}
        VITE_LOGTO_RESOURCE: ${VITE_LOGTO_RESOURCE}
        VITE_CONTACT_EMAIL: ${VITE_CONTACT_EMAIL}
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  pgdata:
